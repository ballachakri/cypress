name: Cypress Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci

      - name: Clean old reports
        run: rm -rf cypress/reports

      - name: Run tests (auto-generates single HTML report)
        run: npm run test:ci
        env:
          CI: true

      - name: Upload single HTML report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-test-report
          path: cypress/reports/index.html
          retention-days: 14