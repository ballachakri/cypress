name: Cypress Tests

on:
   push:
    branches: [main, develop, master]

   pull_request:
    branches: [main, develop, master]

   schedule:
    - cron: '0 4 * * *'

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npm run cy:run
        continue-on-error: true

      - name: Debug reports
        if: always()
        run: |
          echo "===== REPORTS ====="
          ls -R cypress/reports || true

          echo "===== ALL CYPRESS FILES ====="
          find cypress -type f

          echo "===== JSON FILES ====="
          find . -name "*.json"

      # - name: Merge Cypress reports
      #   if: always()
      #   run: npm run report:merge

      - name: Generate HTML report
        if: always()
        run: npm run report:generate

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 14

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 14

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: cypress/reports
          retention-days: 14

      - name: Show generated files
        if: always()
        run: |
          echo "=== Reports ==="
          find cypress -type f