name: Cypress API Tests
on: [push, pull_request]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean old reports
        run: rm -rf cypress/reports

      - name: Run tests & generate single report
        run: npm run test:ci

      - name: Upload final test report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-test-report
          path: cypress/reports/final/index.html
          retention-days: 14