name: Cypress Tests

on:
  push:
  workflow_dispatch:

jobs:
  cypress-run:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - uses: actions/checkout@v4

      - name: Cypress Run (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          command: >
            npx cypress run
            --browser ${{ matrix.browser }}
            --reporter mochawesome
            --reporter-options
            reportDir=cypress/reports/${{ matrix.browser }},overwrite=false,html=false,json=true

      - name: Merge Mochawesome Reports
        run: |
          npx mochawesome-merge \
          cypress/reports/${{ matrix.browser }}/*.json \
          > cypress/reports/${{ matrix.browser }}/merged-report.json

      - name: Generate HTML Report
        run: |
          npx marge \
          cypress/reports/${{ matrix.browser }}/merged-report.json \
          --reportDir cypress/reports/${{ matrix.browser }} \
          --reportFilename "${{ matrix.browser }}-report"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Cypress-${{ matrix.browser }}-Report
          path: cypress/reports/${{ matrix.browser }}